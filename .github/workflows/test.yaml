name: Test

on:
  push:
    branches:
      - main
    paths:
      - build.yaml
      - config.yaml
      - build.json
      - config.json
      - Dockerfile
      - rootfs/**
  pull_request:
    branches:
      - main
    paths:
      - build.yaml
      - config.yaml
      - build.json
      - config.json
      - Dockerfile
      - rootfs/**

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Build matrix
        id: matrix
        run: |
          image_template=$(jq -r '.image' config.json)
          architectures=$(jq -r '.arch[]' config.json)
          matrix='{"include":[]}'
          for arch in $architectures; do
            case "${arch}" in
              amd64) os="ubuntu-24.04" ;;
              aarch64) os="ubuntu-24.04-arm" ;;
              *) echo "::error::Unsupported architecture: ${arch}"; exit 1 ;;
            esac
            build_from=$(jq -r ".build_from.\"${arch}\"" build.json)
            image="${image_template//\{arch\}/${arch}}"
            matrix=$(jq -c \
              --arg arch "$arch" \
              --arg os "$os" \
              --arg image "$image" \
              --arg build_from "$build_from" \
              '.include += [{arch: $arch, os: $os, image: $image, build_from: $build_from}]' <<< "${matrix}")
          done
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }} add-on
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Get build args and labels
        id: build-info
        run: |
          {
            echo "build_args<<EOF"
            echo "BUILD_FROM=${{ matrix.build_from }}"
            jq -r '.args // {} | to_entries[] | "\(.key)=\(.value)"' build.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "labels<<EOF"
            jq -r '.labels // {} | to_entries[] | "\(.key)=\(.value)"' build.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build add-on
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: test
          build-args: ${{ steps.build-info.outputs.build_args }}
          labels: ${{ steps.build-info.outputs.labels }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          load: "true"
          cosign: "false"
          version: test

      - name: Image labels
        run: |
          docker inspect ${{ matrix.image }}:test --format='{{json .Config.Labels}}' | jq
